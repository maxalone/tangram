<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta name="robots" content="noindex" />
<title>Grazie — Tangram.page</title>
<link rel="icon" type="image/x-icon" href="assets/favicon.ico" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
:root{--ink:#0d1218;--paper:#ece7dd;--muted:#8c93a0;--amber:#e7b23a;--line:rgba(236,231,221,.14)}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;background:
  radial-gradient(1000px 700px at 50% -10%,rgba(91,131,192,.16),transparent 60%),
  radial-gradient(800px 600px at 50% 120%,rgba(165,115,64,.12),transparent 60%),var(--ink);
  color:var(--paper);font-family:"IBM Plex Mono",monospace;
  display:flex;align-items:center;justify-content:center;padding:40px 22px}
.card{max-width:520px;text-align:center}
.logo{width:120px;height:auto;margin:0 auto 30px;display:block;
  filter:drop-shadow(0 20px 40px rgba(0,0,0,.5))}
h1{font-family:"Fraunces",serif;font-weight:340;font-size:clamp(2rem,6vw,3rem);line-height:1.05;margin:0 0 16px;letter-spacing:-.02em}
h1 em{font-style:italic;color:var(--amber)}
p{color:#c4bfb5;font-family:"IBM Plex Mono",monospace;font-size:.92rem;line-height:1.8;margin:0 0 34px}
a.back{display:inline-flex;align-items:center;gap:10px;text-decoration:none;color:var(--ink);
  background:var(--paper);font-weight:500;font-size:.86rem;padding:13px 26px;border-radius:999px;transition:transform .25s}
a.back:hover{transform:translateY(-2px)}
.sig{margin-top:34px;font-size:.66rem;letter-spacing:.22em;text-transform:uppercase;color:var(--muted)}
</style>
</head>
<body>
  <div class="card">
    <img class="logo" src="assets/img/tangram_logo.png" alt="Tangram.page" />
    <h1>Messaggio <em>ricevuto</em>.</h1>
    <p>Grazie per aver scritto. Ti risponderò il prima possibile.<br>I pezzi sono al loro posto.</p>
    <a class="back" href="/">← Torna al sito</a>
    <p class="sig">tangram.page · stessi pezzi, infinite forme</p>
  </div>
</body>
</html>
